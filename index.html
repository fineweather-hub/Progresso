
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progresso</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 15px;
    background: #faf9f7;
    color: #1a1a2e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .container {
    max-width: 560px;
    width: 100%;
  }

  .site-header {
    margin-bottom: 48px;
  }

  .site-title {
    font-family: Georgia, serif;
    font-size: 2.6rem;
    font-weight: normal;
    line-height: 1.1;
    letter-spacing: -0.02em;
    color: #1a1a2e;
    margin-bottom: 6px;
  }

  .site-subtitle {
    font-size: 13px;
    color: #aaa;
    font-style: italic;
    letter-spacing: 0.02em;
  }

  .divider {
    border: none;
    border-bottom: 2px solid #1a1a2e;
    margin-bottom: 40px;
  }

  .trackers-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #bbb;
    margin-bottom: 14px;
  }

  .tracker-card {
    background: #fff;
    border: 1px solid #e2e0da;
    border-radius: 8px;
    padding: 18px 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.05);
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 12px;
  }

  .tracker-accent {
    width: 4px;
    border-radius: 99px;
    align-self: stretch;
    flex-shrink: 0;
    min-height: 40px;
  }

  .tracker-body {
    flex: 1;
    min-width: 0;
  }

  .tracker-title {
    font-family: Georgia, serif;
    font-size: 1.05rem;
    line-height: 1.3;
    color: #1a1a2e;
    margin-bottom: 3px;
  }

  .tracker-meta {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 12px;
  }

  .tracker-links {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 13px;
    border-radius: 99px;
    font-size: 12px;
    font-family: inherit;
    text-decoration: none;
    border: 1px solid;
    transition: all .13s;
    cursor: pointer;
    white-space: nowrap;
  }

  .btn-primary {
    background: #1a1a2e;
    color: #fff;
    border-color: #1a1a2e;
  }
  .btn-primary:hover {
    background: #2d2d4a;
    border-color: #2d2d4a;
  }

  .btn-secondary {
    background: #fff;
    color: #555;
    border-color: #d0cec8;
  }
  .btn-secondary:hover {
    background: #f5f4f1;
    border-color: #bbb;
  }

  .btn-icon {
    font-size: 10px;
    opacity: 0.6;
  }

  .footer {
    margin-top: 48px;
    font-size: 11px;
    color: #ccc;
    text-align: center;
    line-height: 1.7;
  }
</style>
</head>
<body>
<div class="container">

  <header class="site-header">
    <h1 class="site-title">Progresso</h1>
    <p class="site-subtitle">Learning trackers &amp; progress maps</p>
  </header>

  <hr class="divider">

  <div class="trackers-label">Trackers</div>

  <div class="tracker-card">
    <div class="tracker-accent" style="background: linear-gradient(180deg, #1565c0, #6a1b9a, #2e7d32)"></div>
    <div class="tracker-body">
      <div class="tracker-title">7th Grade Math</div>
      <div class="tracker-meta">IXL Skills → Washington State Standards · 5 domains · 105 skills</div>
      <div class="tracker-links">
        <a class="btn btn-primary"
           href="https://fineweather-hub.github.io/Progresso/math.html?gist=5a66c089fdc23c26d44a699ed86bd765">
          View progress <span class="btn-icon">↗</span>
        </a>
        <a class="btn btn-secondary"
           href="https://fineweather-hub.github.io/Progresso/math.html">
          ✏ Admin
        </a>
      </div>
    </div>
  </div>

  <footer class="footer">
    Powered by IXL &amp; Washington Learning Commons Knowledge Graph
  </footer>

</div>
</body>
</html>
