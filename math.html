<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>7th Grade Math — IXL Skills Map</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 14px; line-height: 1.6;
  color: #1a1a2e; background: #faf9f7;
  padding: 28px 16px 80px;
}
.page { max-width: 900px; margin: 0 auto; }

h1 { font-family: Georgia, serif; font-size: 1.8rem; line-height: 1.15; margin-bottom: 4px; }
h1 span { font-weight: 300; font-size: 0.62em; font-style: italic; display: block; font-family: system-ui; color: #666; }
.subtitle { font-size: 12px; color: #999; margin-bottom: 16px; }

/* Header progress bar */
.progress-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
.progress-bar { flex: 1; height: 10px; background: #4a4038; border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 99px; transition: width .5s ease; }
.progress-label { font-size: 12px; color: #666; white-space: nowrap; }

/* Metric cards */
.metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.metric-card { background: #fff; border: 1px solid #e2e0da; border-radius: 8px; padding: 12px 14px; }
.metric-card .m-label { font-size: 11px; color: #999; margin-bottom: 3px; }
.metric-card .m-value { font-size: 24px; font-weight: 600; line-height: 1; margin-bottom: 5px; }
.metric-card .m-breakdown { display: flex; gap: 6px; flex-wrap: wrap; }
.m-chip {
  font-size: 10px; font-weight: 500; padding: 1px 7px;
  border-radius: 99px; border: 1px solid transparent; white-space: nowrap;
}

/* Filters */
.filter-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; align-items: center; }
.filter-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 10px; border-radius: 99px;
  border: 1px solid #ccc; background: #fff; color: #666;
  font-size: 11px; cursor: pointer; font-family: inherit; transition: all .12s;
}
.filter-pill.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }
.filter-pill:hover:not(.active) { background: #f0efeb; }
.header-divider { border: none; border-bottom: 2px solid #1a1a2e; margin: 16px 0 28px; }

/* Domain sections */
.domain-section { margin-bottom: 36px; }
.domain-header {
  display: flex; align-items: center; gap: 8px;
  padding-bottom: 8px; margin-bottom: 12px;
  cursor: pointer; user-select: none;
}
.domain-label { font-size: 11px; font-weight: 700; letter-spacing: .05em; padding: 2px 9px; border-radius: 99px; border: 1px solid; }
.domain-title { font-size: 15px; font-weight: 500; }
.domain-meta  { margin-left: auto; font-size: 11px; color: #aaa; }
.domain-toggle { font-size: 10px; color: #bbb; }

/* Standard cards */
.std-card {
  background: #fff; border: 1px solid #e2e0da; border-radius: 8px;
  margin-bottom: 10px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.std-card.mastered {
  background: #f0faf4; border-color: #74c69d;
  box-shadow: 0 1px 6px rgba(45,106,79,.12);
}
.std-header { display: flex; align-items: flex-start; gap: 10px; padding: 11px 14px; cursor: pointer; user-select: none; }
.std-header:hover { background: rgba(0,0,0,.02); }
.std-card.mastered .std-header:hover { background: rgba(45,106,79,.04); }
.std-code {
  font-size: 10px; font-weight: 700; color: #fff;
  padding: 2px 7px; border-radius: 4px; white-space: nowrap;
  margin-top: 2px; flex-shrink: 0; letter-spacing: .04em;
}
.std-info { flex: 1; min-width: 0; }
.std-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 3px; }
.std-title { font-size: 14px; font-weight: 500; }
.std-toggle { font-size: 10px; color: #bbb; flex-shrink: 0; margin-top: 2px; }
.mastered-mark { font-size: 14px; color: #2d6a4f; flex-shrink: 0; margin-top: 1px; }
.std-ican { font-size: 12px; color: #777; font-style: italic; margin-bottom: 5px; line-height: 1.4; }
.std-card.mastered .std-ican { color: #2d6a4f; }

/* LC pips */
.lc-pips-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.lc-pips-label { font-size: 10px; color: #aaa; white-space: nowrap; }
.lc-pips { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.lc-pip {
  width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0;
  position: relative; cursor: default;
}
.lc-pip:hover::after {
  content: attr(data-tip);
  position: absolute; bottom: calc(100% + 5px); left: 50%; transform: translateX(-50%);
  background: #1a1a2e; color: #fff; font-size: 11px; font-style: normal;
  white-space: nowrap; padding: 3px 7px; border-radius: 4px;
  pointer-events: none; z-index: 10;
}

/* Progress bars */
.skill-bar-row { display: flex; align-items: center; gap: 8px; }
.skill-bar-label { font-size: 10px; color: #aaa; white-space: nowrap; }
.mini-bar { display: flex; align-items: center; gap: 6px; flex: 1; }
.mini-bar-track { flex: 1; height: 8px; background: #4a4038; border-radius: 99px; overflow: hidden; }
.mini-bar-fill  { height: 100%; border-radius: 99px; transition: width .4s ease; }
.mini-bar-count { font-size: 11px; color: #aaa; min-width: 32px; text-align: right; }

/* Standard body */
.std-body { display: none; border-top: 1px solid #f0efeb; }
.std-card.mastered .std-body { border-top-color: #c3e6cb; }
.std-body.open { display: block; }

/* LC rows */
.lc-row { border-bottom: 1px solid #f5f4f1; }
.lc-row:last-child { border-bottom: none; }
.lc-header { display: flex; align-items: flex-start; gap: 8px; padding: 9px 14px; }
.lc-header.has-skills { cursor: pointer; }
.lc-header.has-skills:hover { background: rgba(0,0,0,.02); }
.lc-pip-inline { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; margin-top: 4px; }
.lc-body { flex: 1; min-width: 0; }
.lc-title-row { display: flex; align-items: baseline; gap: 7px; flex-wrap: wrap; margin-bottom: 2px; }
.lc-subcode { font-size: 9px; font-weight: 700; letter-spacing: .05em; padding: 1px 5px; border-radius: 3px; white-space: nowrap; flex-shrink: 0; }
.lc-label { font-size: 13px; color: #1a1a2e; }
.lc-bar-wrap { margin-top: 3px; }
.lc-meta { display: flex; align-items: center; gap: 6px; flex-shrink: 0; margin-top: 1px; }
.lc-toggle { font-size: 10px; color: #ccc; }
.lc-skills { display: none; flex-wrap: wrap; gap: 5px; padding: 6px 14px 11px 34px; }
.lc-skills.open { display: flex; }

/* Badges */
.badge {
  display: inline-block; border-radius: 99px;
  padding: 1px 8px; font-size: 11px; font-weight: 500;
  white-space: nowrap; border: 1px solid transparent;
}

/* Skill pills */
.skill-pill {
  display: inline-flex; align-items: center; gap: 5px;
  border-radius: 6px; border: 1px solid #e0e0e0;
  padding: 3px 8px 3px 5px; font-size: 12px; line-height: 1.4;
  text-decoration: none; color: #333;
}
.skill-pill:hover { text-decoration: underline; }
.skill-code { font-size: 9px; font-weight: 700; background: #efefef; border-radius: 3px; padding: 1px 4px; color: #888; }

/* Legend */
.legend { display: flex; gap: 14px; flex-wrap: wrap; font-size: 11px; color: #888; margin-bottom: 6px; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-pip  { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.legend-swatch { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }

/* Sync bar */
.sync-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; font-size: 11px; color: #aaa; }
.sync-bar a { color: #aaa; }

/* Rainbow animation for 100% */
@keyframes rainbow-shift {
  0%   { background-position: 0% 50%; }
  100% { background-position: 200% 50%; }
}
.bar-rainbow {
  background: linear-gradient(90deg, #ff4ecd, #ff9a3c, #ffe01b, #3cf5c8, #4d9fff, #b44dff, #ff4ecd);
  background-size: 200% 100%;
  animation: rainbow-shift 2s linear infinite;
}

@media (max-width: 520px) {
  .metrics { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div class="page">
  <h1>7th Grade Math <span>IXL Skills → Common Core Standards</span></h1>
  <div id="subtitle" class="subtitle"></div>

  <div class="metrics">
    <div class="metric-card">
      <div class="m-label">Standards</div>
      <div class="m-value" id="m-std" style="color:#2d6a4f">–</div>
      <div class="m-breakdown" id="m-std-chips"></div>
    </div>
    <div class="metric-card">
      <div class="m-label">Learning components</div>
      <div class="m-value" id="m-lc" style="color:#1d9e75">–</div>
      <div class="m-breakdown" id="m-lc-chips"></div>
    </div>
    <div class="metric-card">
      <div class="m-label">IXL skills (unique)</div>
      <div class="m-value" id="m-sk" style="color:#185fa5">–</div>
      <div class="m-breakdown" id="m-sk-chips"></div>
    </div>
  </div>

  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
    <div class="progress-label" id="plabel"></div>
  </div>

  <div class="sync-bar">
    <span id="sync-time"></span>
    <span>·</span>
    <a href="../../actions/workflows/MathSync.yml" target="_blank" rel="noopener">↻ Trigger sync</a>
  </div>

  <div class="filter-bar" id="domain-filters">
    <button class="filter-pill active" data-domain="all">All domains</button>
  </div>
  <div class="filter-bar" id="status-filters">
    <button class="filter-pill active" data-status="all">All statuses</button>
    <button class="filter-pill" data-status="Mastered">Mastered</button>
    <button class="filter-pill" data-status="In progress">In progress</button>
    <button class="filter-pill" data-status="Not started">Not started</button>
  </div>

  <div class="legend">
    <span style="font-size:11px;color:#aaa;font-weight:500;margin-right:2px">LC pips:</span>
    <div class="legend-item"><span class="legend-pip" style="background:#52b788"></span>Done</div>
    <div class="legend-item"><span class="legend-pip" style="background:#ffc107"></span>In progress</div>
    <div class="legend-item"><span class="legend-pip" style="background:#d5d3cc"></span>Not started</div>
    <span style="margin:0 4px;color:#ddd">|</span>
    <span style="font-size:11px;color:#aaa;font-weight:500;margin-right:2px">Skills:</span>
    <div class="legend-item"><span class="legend-swatch" style="background:#d8f3dc;border:1.5px solid #52b788"></span>Practiced</div>
    <div class="legend-item"><span class="legend-swatch" style="background:#e6f1fb;border:1.5px solid #74aee0"></span>Assigned</div>
    <div class="legend-item"><span class="legend-swatch" style="background:#f5f5f5;border:1.5px solid #ccc"></span>Not started</div>
  </div>

  <hr class="header-divider">
  <div id="content"></div>
</div>

<script>
// Math domain configuration — RP/NS/EE/G/SP with distinct color palette
const DOMAIN_CFG = {
  RP: { label: "Ratios & Proportional Relationships", color: "#D85A30", bg: "#FAECE7", text: "#4A1B0C" },
  NS: { label: "The Number System",                  color: "#185FA5", bg: "#E6F1FB", text: "#042C53" },
  EE: { label: "Expressions & Equations",            color: "#BA7517", bg: "#FAEEDA", text: "#412402" },
  G:  { label: "Geometry",                           color: "#2D7D46", bg: "#E8F5EE", text: "#0D3320" },
  SP: { label: "Statistics & Probability",           color: "#7B3FA0", bg: "#F3EAFE", text: "#3A1558" },
};

const STATUS_CFG = {
  std: {
    "Mastered":    { bg: "#c8f0d8", border: "#40a86a", text: "#1b4332" },
    "In progress": { bg: "#fff3cd", border: "#ffc107", text: "#5a4000" },
    "Not started": { bg: "#f1efe8", border: "#ccc",    text: "#555"    },
  },
  lc: {
    "Done":        { bg: "#d8f3dc", border: "#52b788", text: "#1b4332" },
    "In progress": { bg: "#fff3cd", border: "#ffc107", text: "#5a4000" },
    "Not started": { bg: "#f1efe8", border: "#ccc",    text: "#555"    },
  },
  skill: {
    "Practiced":   { bg: "#d8f3dc", border: "#52b788", text: "#1b4332", codeBg: "#b7e4c7" },
    "Assigned":    { bg: "#e6f1fb", border: "#74aee0", text: "#042c53", codeBg: "#b5d4f4" },
    "Not started": { bg: "#fafafa", border: "#ddd",    text: "#333",    codeBg: "#efefef" },
  },
};

const PIP_COLORS = {
  "Done":        "#52b788",
  "In progress": "#ffc107",
  "Not started": "#d5d3cc",
};

// Tier stops: 1–25% iron, 26–50% bronze, 51–75% silver, 76–99% gold, 100% rainbow
const TIER = [
  { max: 0.001, grad: null },
  { max: 0.26,  grad: "linear-gradient(90deg,#8a5a8a,#d4a0d4)" },
  { max: 0.51,  grad: "linear-gradient(90deg,#8a3800,#e8741a)" },
  { max: 0.76,  grad: "linear-gradient(90deg,#6ab0d8,#d4f0ff)" },
  { max: 1.0,   grad: "linear-gradient(90deg,#c89400,#ffe84d)" },
  { max: 2.0,   grad: null, rainbow: true },
];

const SKILL_ORDER = ["Practiced", "Assigned", "Not started"];

// Math domain render order
const DOMAIN_ORDER = ["RP", "NS", "EE", "G", "SP"];

function barStyle(pct) {
  if (pct <= 0) return "background:none";
  for (const t of TIER) {
    if (pct <= t.max) {
      return t.rainbow ? "" : `background:${t.grad}`;
    }
  }
  return `background:${TIER[4].grad}`;
}

function applyBar(el, pct) {
  const pctRound = Math.round(pct * 100);
  el.style.width = pctRound + "%";
  el.classList.remove("bar-rainbow");
  if (pct >= 1.0 && el.closest(".progress-bar,div")) {
    el.classList.add("bar-rainbow");
    el.style.background = "";
  } else {
    el.style.cssText = `width:${pctRound}%;${barStyle(pct)}`;
  }
}

function badge(label, type) {
  const c = STATUS_CFG[type]?.[label] || STATUS_CFG[type]?.["Not started"] || {};
  return `<span class="badge" style="background:${c.bg};border-color:${c.border};color:${c.text}">${label}</span>`;
}

function iCan(pl) {
  if (!pl) return "";
  let s = pl.replace(/\s+/g, " ").trim().replace(/[.!?,;]+$/, "");
  return "I can " + s + ".";
}

function chip(label, n, bg, border, text) {
  return `<span class="m-chip" style="background:${bg};border-color:${border};color:${text}">${n} ${label}</span>`;
}

// Unique skills globally: deduplicate by id across all standards
function uniqueSkills(standards) {
  const seen = new Set();
  const out = [];
  for (const std of standards)
    for (const lc of std.lcs)
      for (const sk of lc.skills)
        if (!seen.has(sk.id)) { seen.add(sk.id); out.push(sk); }
  return out;
}

// Per-standard: isDupe marks skills already counted in an earlier LC of the same standard
function stdSkillPct(std) {
  const all = std.lcs.flatMap(lc => lc.skills).filter(sk => !sk.isDupe);
  if (!all.length) return -1;
  return all.filter(s => s.status === "Practiced").length / all.length;
}

function lcSkillPct(lc) {
  if (!lc.skills.length) return -1;
  return lc.skills.filter(s => s.status === "Practiced").length / lc.skills.length;
}

// Math sub-standard detection: e.g. "7.RP.A.2.a" under "7.RP.A.2", or "7.EE.B.4.a" under "7.EE.B.4"
// LC codes use the .lc1/.lc2 suffix scheme — sub-standard codes are the part before .lcN
function isSubCode(stdCode, lcCode) {
  if (!lcCode || lcCode === stdCode) return false;
  // Strip the .lcN suffix to get the conceptual code, compare against parent
  const conceptual = lcCode.replace(/\.lc\d+$/, "");
  return conceptual !== stdCode && conceptual.startsWith(stdCode + ".");
}

// Derive display code from LC code: strip .lcN suffix
function lcDisplayCode(lcCode) {
  return lcCode ? lcCode.replace(/\.lc\d+$/, "") : "";
}

function lcLabel(lc) {
  if (lc.shortTitle && lc.shortTitle.trim()) return lc.shortTitle.trim();
  return lc.text.replace(/\s+/g, " ").trim();
}

let ALL_STANDARDS = [];
let activeDomain = "all";
let activeStatus = "all";

function buildDomainFilters(standards) {
  const bar = document.getElementById("domain-filters");
  DOMAIN_ORDER.forEach(d => {
    if (!standards.some(s => s.domain === d)) return;
    const dc = DOMAIN_CFG[d];
    const btn = document.createElement("button");
    btn.className = "filter-pill";
    btn.dataset.domain = d;
    btn.style.cssText = `background:${dc.bg};border-color:${dc.color};color:${dc.text}`;
    btn.innerHTML = `<strong>${d}</strong> ${dc.label}`;
    bar.appendChild(btn);
  });
}

function applyFilters() {
  renderContent(ALL_STANDARDS.filter(s => {
    if (activeDomain !== "all" && s.domain !== activeDomain) return false;
    if (activeStatus !== "all" && s.status !== activeStatus) return false;
    return true;
  }));
}

function renderContent(standards) {
  const content = document.getElementById("content");
  content.innerHTML = "";
  const byDomain = {};
  for (const std of standards) {
    if (!byDomain[std.domain]) byDomain[std.domain] = [];
    byDomain[std.domain].push(std);
  }
  DOMAIN_ORDER.forEach(domain => {
    const stds = byDomain[domain];
    if (!stds) return;
    const dc = DOMAIN_CFG[domain];

    stds.sort((a, b) => {
      const pa = stdSkillPct(a), pb = stdSkillPct(b);
      if (Math.abs(pb - pa) > 0.001) return pb - pa;
      return a.code.localeCompare(b.code);
    });

    const domainUniq = uniqueSkills(stds);
    const practiced  = domainUniq.filter(s => s.status === "Practiced").length;
    const sec = document.createElement("div");
    sec.className = "domain-section";
    const hdr = document.createElement("div");
    hdr.className = "domain-header";
    hdr.style.borderBottom = `2px solid ${dc.color}`;
    hdr.innerHTML = `
      <span class="domain-label" style="background:${dc.bg};border-color:${dc.color};color:${dc.text}">${domain}</span>
      <span class="domain-title">${dc.label}</span>
      <span class="domain-meta">${practiced}/${domainUniq.length} skills · ${stds.length} standards</span>
      <span class="domain-toggle">▲</span>`;
    let collapsed = false;
    const body = document.createElement("div");
    hdr.onclick = () => {
      collapsed = !collapsed;
      body.style.display = collapsed ? "none" : "";
      hdr.querySelector(".domain-toggle").textContent = collapsed ? "▼" : "▲";
    };
    sec.appendChild(hdr);
    for (const std of stds) body.appendChild(renderStdCard(std, dc));
    sec.appendChild(body);
    content.appendChild(sec);
  });
  if (standards.length === 0)
    content.innerHTML = `<p style="color:#aaa;text-align:center;padding:40px 0">No standards match the current filters.</p>`;
}

function renderStdCard(std, dc) {
  const uniq      = std.lcs.flatMap(lc => lc.skills).filter(sk => !sk.isDupe);
  const practiced = uniq.filter(s => s.status === "Practiced").length;
  const pct       = uniq.length > 0 ? practiced / uniq.length : 0;
  const isMastered = std.status === "Mastered";

  const card = document.createElement("div");
  card.className = "std-card" + (isMastered ? " mastered" : "");

  const pipsHtml = std.lcs.map(lc => {
    const color = PIP_COLORS[lc.status] || PIP_COLORS["Not started"];
    const dispCode = lcDisplayCode(lc.code);
    const tip = isSubCode(std.code, lc.code) ? `${dispCode}: ${lc.status}` : lc.status;
    return `<span class="lc-pip" style="background:${color}" data-tip="${tip}"></span>`;
  }).join("");

  const hdr = document.createElement("div");
  hdr.className = "std-header";

  hdr.innerHTML = `
    <span class="std-code" style="background:${isMastered ? "#2d6a4f" : dc.color}">${std.code}</span>
    <div class="std-info">
      <div class="std-title-row">
        <span class="std-title">${std.shortTitle || std.code}</span>
        ${badge(std.status || "Not started", "std")}
        ${isMastered ? `<span class="mastered-mark">✓</span>` : ""}
      </div>
      <div class="std-ican">${iCan(std.plainLanguage)}</div>
      <div class="lc-pips-row">
        <span class="lc-pips-label">LCs</span>
        <div class="lc-pips">${pipsHtml}</div>
      </div>
      <div class="skill-bar-row">
        <span class="skill-bar-label">IXL skills</span>
        <div class="mini-bar">
          <div class="mini-bar-track"><div class="mini-bar-fill" id="sf-${std.id}"></div></div>
          <span class="mini-bar-count">${practiced}/${uniq.length}</span>
        </div>
      </div>
    </div>
    <span class="std-toggle">▼</span>`;

  const bodyEl = document.createElement("div");
  bodyEl.className = "std-body";

  if (std.lcs.length === 0) {
    const e = document.createElement("div");
    e.style.cssText = "padding:12px 14px;font-size:13px;color:#aaa;font-style:italic";
    e.textContent = "No learning components linked.";
    bodyEl.appendChild(e);
  } else {
    const statusOrder = { "Done": 0, "In progress": 1, "Not started": 2 };
    const sorted = [...std.lcs].sort((a, b) => {
      const pa = lcSkillPct(a), pb = lcSkillPct(b);
      if (Math.abs(pb - pa) > 0.001) return pb - pa;
      return (statusOrder[a.status] ?? 9) - (statusOrder[b.status] ?? 9);
    });
    for (const lc of sorted) bodyEl.appendChild(renderLCRow(lc, std.code, dc));
  }

  hdr.onclick = () => {
    const open = bodyEl.classList.toggle("open");
    hdr.querySelector(".std-toggle").textContent = open ? "▲" : "▼";
  };

  card.appendChild(hdr);
  card.appendChild(bodyEl);

  requestAnimationFrame(() => {
    const fill = card.querySelector(`#sf-${std.id}`);
    if (fill) applyBar(fill, pct);
  });

  return card;
}

function renderLCRow(lc, stdCode, dc) {
  const hasSkills = lc.skills?.length > 0;
  const practiced = lc.skills?.filter(s => s.status === "Practiced").length || 0;
  const pct       = hasSkills ? practiced / lc.skills.length : 0;
  const pipColor  = PIP_COLORS[lc.status] || PIP_COLORS["Not started"];
  const showSub   = isSubCode(stdCode, lc.code);
  const dispCode  = lcDisplayCode(lc.code);

  const row = document.createElement("div");
  row.className = "lc-row";

  const subHtml = showSub
    ? `<span class="lc-subcode" style="background:${dc.bg};color:${dc.text};border:1px solid ${dc.color}">${dispCode}</span>`
    : "";

  const barId = `lf-${lc.id.replace(/[^a-z0-9]/gi, "")}`;

  const hdr = document.createElement("div");
  hdr.className = "lc-header" + (hasSkills ? " has-skills" : "");
  hdr.innerHTML = `
    <span class="lc-pip-inline" style="background:${pipColor}"></span>
    <div class="lc-body">
      <div class="lc-title-row">${subHtml}<span class="lc-label">${lcLabel(lc)}</span></div>
      ${hasSkills ? `<div class="lc-bar-wrap"><div class="mini-bar">
        <div class="mini-bar-track"><div class="mini-bar-fill" id="${barId}"></div></div>
        <span class="mini-bar-count">${practiced}/${lc.skills.length}</span>
      </div></div>` : ""}
    </div>
    <div class="lc-meta">
      ${badge(lc.status || "Not started", "lc")}
      ${hasSkills ? `<span class="lc-toggle">▼</span>` : ""}
    </div>`;

  const skillsEl = document.createElement("div");
  skillsEl.className = "lc-skills";

  if (hasSkills) {
    const sorted = [...lc.skills].sort((a, b) =>
      SKILL_ORDER.indexOf(a.status) - SKILL_ORDER.indexOf(b.status));
    for (const sk of sorted) {
      const sc  = STATUS_CFG.skill[sk.status] || STATUS_CFG.skill["Not started"];
      const url = sk.url || (sk.permacode ? `https://www.ixl.com/search?q=${sk.permacode}` : "#");
      const pill = document.createElement("a");
      pill.className = "skill-pill";
      pill.href = url; pill.target = "_blank"; pill.rel = "noopener";
      pill.style.cssText = `background:${sc.bg};border-color:${sc.border};color:${sc.text}`;
      pill.innerHTML = sk.permacode
        ? `<span class="skill-code" style="background:${sc.codeBg};color:${sc.text}">${sk.permacode}</span>${sk.skillTitle || sk.name}`
        : sk.skillTitle || sk.name;
      skillsEl.appendChild(pill);
    }
    hdr.onclick = () => {
      const open = skillsEl.classList.toggle("open");
      hdr.querySelector(".lc-toggle").textContent = open ? "▲" : "▼";
    };
  }

  row.appendChild(hdr);
  row.appendChild(skillsEl);

  requestAnimationFrame(() => {
    const fill = row.querySelector(`#${barId}`);
    if (fill) applyBar(fill, pct);
  });

  return row;
}

// Filter wiring
document.getElementById("domain-filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-pill");
  if (!btn) return;
  activeDomain = btn.dataset.domain;
  document.querySelectorAll("#domain-filters .filter-pill").forEach(b => {
    const d = DOMAIN_CFG[b.dataset.domain];
    const isActive = b.dataset.domain === activeDomain;
    b.classList.toggle("active", isActive);
    if (d && b.dataset.domain !== "all") {
      b.style.cssText = isActive
        ? `background:${d.bg};border-color:${d.color};color:${d.text};outline:2px solid ${d.color}`
        : `background:${d.bg};border-color:${d.color};color:${d.text};opacity:${activeDomain === "all" ? 1 : 0.4}`;
    }
  });
  applyFilters();
});

document.getElementById("status-filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-pill");
  if (!btn) return;
  activeStatus = btn.dataset.status;
  document.querySelectorAll("#status-filters .filter-pill").forEach(b =>
    b.classList.toggle("active", b.dataset.status === activeStatus));
  applyFilters();
});

// Init
async function init() {
  try {
    const res = await fetch("public/math-data.json");
    if (!res.ok) throw new Error(`HTTP ${res.status} — run the sync workflow first`);
    const data = await res.json();
    ALL_STANDARDS = data.standards || [];

    const uniq        = uniqueSkills(ALL_STANDARDS);
    const skPracticed = uniq.filter(s => s.status === "Practiced").length;
    const skAssigned  = uniq.filter(s => s.status === "Assigned").length;
    const skNotStart  = uniq.filter(s => s.status === "Not started").length;

    const allLCs  = ALL_STANDARDS.flatMap(s => s.lcs);
    const lcDone  = allLCs.filter(lc => lc.status === "Done").length;
    const lcInProg = allLCs.filter(lc => lc.status === "In progress").length;
    const lcNotStart = allLCs.length - lcDone - lcInProg;

    const stdMastered = ALL_STANDARDS.filter(s => s.status === "Mastered").length;
    const stdInProg   = ALL_STANDARDS.filter(s => s.status === "In progress").length;
    const stdNotStart = ALL_STANDARDS.length - stdMastered - stdInProg;

    // Main values
    document.getElementById("m-std").textContent = stdMastered;
    document.getElementById("m-lc").textContent  = lcDone;
    document.getElementById("m-sk").textContent  = skPracticed;

    // Breakdown chips
    document.getElementById("m-std-chips").innerHTML =
      chip("mastered",    stdMastered, "#c8f0d8", "#40a86a", "#1b4332") +
      chip("in progress", stdInProg,   "#fff3cd", "#ffc107", "#5a4000") +
      chip("not started", stdNotStart, "#f1efe8", "#ccc",    "#555");

    document.getElementById("m-lc-chips").innerHTML =
      chip("done",        lcDone,     "#d8f3dc", "#52b788", "#1b4332") +
      chip("in progress", lcInProg,   "#fff3cd", "#ffc107", "#5a4000") +
      chip("not started", lcNotStart, "#f1efe8", "#ccc",    "#555");

    document.getElementById("m-sk-chips").innerHTML =
      chip("practiced",   skPracticed, "#d8f3dc", "#52b788", "#1b4332") +
      chip("assigned",    skAssigned,  "#e6f1fb", "#74aee0", "#042c53") +
      chip("not started", skNotStart,  "#f1efe8", "#ccc",    "#555");

    // Header bar
    const pct = uniq.length > 0 ? skPracticed / uniq.length : 0;
    const headerFill = document.getElementById("pbar");
    applyBar(headerFill, pct);
    document.getElementById("plabel").innerHTML =
      `<strong>${skPracticed}</strong>/${uniq.length} skills · <strong>${lcDone}</strong>/${allLCs.length} LCs`;

    const syncDate = data.synced ? new Date(data.synced).toLocaleString() : "unknown";
    document.getElementById("sync-time").textContent = `Synced ${syncDate}`;
    document.getElementById("subtitle").textContent =
      `7th Grade Math · Common Core Standards · ${ALL_STANDARDS.length} standards`;

    buildDomainFilters(ALL_STANDARDS);
    renderContent(ALL_STANDARDS);
  } catch (err) {
    document.getElementById("subtitle").textContent = "Error loading data";
    const errDiv = document.createElement("div");
    errDiv.style.cssText = "margin:16px 0;padding:12px 16px;background:#fff3cd;border:1px solid #ffc107;border-radius:6px;font-size:13px";
    errDiv.innerHTML = `<strong>Could not load math-data.json:</strong> ${err.message}<br>
      <small>Run the GitHub Actions sync workflow, or run <code>node MathSync.js</code> locally first.</small>`;
    document.querySelector(".page").insertBefore(errDiv, document.getElementById("content"));
  }
}

init();
</script>
